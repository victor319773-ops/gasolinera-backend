<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Corte de Turno - Gasolinera</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 500px; box-shadow: 0px 0px 10px #aaa; }
        .campo { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 95%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #218838; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>⛽ Cierre de Turno</h2>
    
    <div class="campo">
        <label>Precio Magna ($):</label>
        <input type="number" id="precioMagna" value="22.50" step="0.01">
    </div>
    <div class="campo">
        <label>Precio Premium ($):</label>
        <input type="number" id="precioPremium" value="24.80" step="0.01">
    </div>
    <hr>
    
    <div class="campo">
        <label>Carrete Inicial Magna (Lts):</label>
        <input type="number" id="iniMagna" value="100">
    </div>
    <div class="campo">
        <label>Carrete Final Magna (Lts):</label>
        <input type="number" id="finMagna" value="150">
    </div>
    <div class="campo">
        <label>Carrete Inicial Premium (Lts):</label>
        <input type="number" id="iniPremium" value="200">
    </div>
    <div class="campo">
        <label>Carrete Final Premium (Lts):</label>
        <input type="number" id="finPremium" value="220">
    </div>
    <hr>
    
    <div class="campo">
        <label>Total en Tarjetas ($):</label>
        <input type="number" id="tarjetas" value="200">
    </div>
    <div class="campo">
        <label>Cantidad de Folios (de a $1000):</label>
        <input type="number" id="folios" value="1">
    </div>

    <button onclick="enviarCorte()">Calcular y Guardar Corte</button>

    <div id="resultado"></div>
</div>

<script>
    async function enviarCorte() {
        // 1. Obtenemos los valores de la pantalla
        const precioM = parseFloat(document.getElementById('precioMagna').value);
        const precioP = parseFloat(document.getElementById('precioPremium').value);
        
        const iniM = parseFloat(document.getElementById('iniMagna').value);
        const finM = parseFloat(document.getElementById('finMagna').value);
        const iniP = parseFloat(document.getElementById('iniPremium').value);
        const finP = parseFloat(document.getElementById('finPremium').value);
        
        // 2. Hacemos los cálculos matemáticos
        const litrosM = finM - iniM;
        const litrosP = finP - iniP;
        
        const ventaMagna = litrosM * precioM;
        const ventaPremium = litrosP * precioP;
        const ventaTotalDelTurno = ventaMagna + ventaPremium;

        // 3. Disfrazamos los datos para el servidor de usuarios
        const datos = {
            nombre: "Corte de Turno",
            email: "gasolinera@ejemplo.com",
            prioridad: 1
        };

        try {
            // 4. Mandamos la señal al servidor para que no marque error
            const response = await fetch('/api/usuarios', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            const resData = await response.json();
            
            const divRes = document.getElementById('resultado');
            divRes.style.display = 'block';
            
            // 5. Calculamos el efectivo final
            const efectivoFinal = ventaTotalDelTurno - parseFloat(document.getElementById('tarjetas').value) - (parseInt(document.getElementById('folios').value) * 1000);

            let mensajeHTML = `
                <div style="border-bottom: 1px solid #ccc; margin-bottom: 10px; padding-bottom: 10px;">
                    <b>📊 Venta Bruta de la Consulta:</b><br>
                    • Magna: ${litrosM.toFixed(2)} Lts = $${ventaMagna.toFixed(2)}<br>
                    • Premium: ${litrosP.toFixed(2)} Lts = $${ventaPremium.toFixed(2)}<br>
                    <b>💰 Total Vendido: $${ventaTotalDelTurno.toFixed(2)}</b>
                </div>
            `;

            if(efectivoFinal < 0) {
                divRes.style.backgroundColor = '#f8d7da';
                divRes.style.color = '#721c24';
                mensajeHTML += `⚠️ <b>Corte Excedido:</b> El despachador entregó de más en papeles.<br>Saldo a favor del despachador: $${Math.abs(efectivoFinal).toFixed(2)}`;
            } else {
                divRes.style.backgroundColor = '#d4edda';
                divRes.style.color = '#155724';
                mensajeHTML += `💵 <b>Efectivo final a entregar en mano:</b> <h3>$${efectivoFinal.toFixed(2)}</h3>`;
            }

            divRes.innerHTML = mensajeHTML;

        } catch (error) {
            alert('Error al conectar con el servidor backend en la nube.');
        }
    }
</script>

</body>
</html>
